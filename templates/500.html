{% extends "base.html" %}

{% block title %}Bir Sorun Oluştu | Diyetisyen Mısra Çakır{% endblock %}

{% block content %}

<section class="error-page">
  <div class="error-card">
    <p class="error-code">500</p>

    <h1>Bir sorun oluştu.</h1>

    <p>
      Şu anda teknik bir problem yaşanıyor olabilir.
      Lütfen kısa süre sonra tekrar dene.
    </p>

    <div class="error-actions">
      <a class="btn" href="{{ url_for('public.home') }}">Ana Sayfaya Dön</a>
      <a class="btn ghost" href="{{ url_for('public.iletisim') }}">İletişime Geç</a>
    </div>
  </div>
</section>

{% endblock %}
