{% extends "admin/admin_base.html" %}
{% block title %}Menü Ekle{% endblock %}
{% block content %}
<section class="admin-page-head"><div><p class="admin-kicker">Admin Panel</p><h2 class="admin-title">Yeni Menü</h2></div><a class="btn ghost" href="{{ url_for('admin.admin_menus') }}">← Listeye dön</a></section>
<section class="admin-form-layout"><div class="admin-form-card">
<form method="post" class="admin-form">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="form-group full"><label>Menü Başlığı</label><input name="title" required placeholder="Örn: Yüksek Protein Menü"></div>
  <div class="form-group"><label>Kategori</label><input name="category" placeholder="Örn: Yüksek protein"></div>
  <div class="form-group"><label>Sıra</label><input type="number" name="order_no" value="1"></div>
  <div class="form-group full"><label>Öğünler</label><div class="admin-helper-ribbon" aria-label="Yazım yardımı"><span class="admin-helper-chip">Kahvaltı</span><span class="admin-helper-chip">Öğle</span><span class="admin-helper-chip">Akşam</span><span class="admin-helper-chip">Ara öğün</span><span class="admin-helper-chip">Satır satır düzen</span></div><textarea name="meals" rows="7" required placeholder="Kahvaltı: ...&#10;Öğle: ...&#10;Akşam: ..."></textarea></div>
  <div class="form-group"><label>Buton Yazısı</label><input name="button_text" value="Randevu al"></div>
  <div class="form-group full"><label class="check-row"><input type="checkbox" name="is_active" checked> Aktif yayınlansın</label></div>
  <div class="admin-form-actions"><button class="btn" type="submit">Kaydet</button><a class="btn ghost" href="{{ url_for('admin.admin_menus') }}">İptal</a></div>
</form>
</div></section>
{% endblock %}
