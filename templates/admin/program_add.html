{% extends "admin/admin_base.html" %}
{% block title %}Danışmanlık Alanı Ekle{% endblock %}
{% block content %}
<section class="admin-page-head"><div><p class="admin-kicker">Admin Panel</p><h2 class="admin-title">Yeni Danışmanlık Alanı</h2></div><a class="btn ghost" href="{{ url_for('admin.admin_programs') }}">← Listeye dön</a></section>
<section class="admin-form-layout"><div class="admin-form-card">
<form method="post" class="admin-form">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="form-group full"><label>Başlık</label><input name="title" required placeholder="Örn: Kilo Kontrolü"></div>
  <div class="form-group full"><label>Açıklama</label><textarea name="description" rows="4" required></textarea></div>
  <div class="form-group full"><label>Maddeler</label><textarea name="bullets" rows="5" placeholder="Her satıra bir madde yaz"></textarea></div>
  <div class="form-group"><label>Buton Yazısı</label><input name="button_text" value="Randevu al"></div>
  <div class="form-group"><label>Sıra</label><input type="number" name="order_no" value="1"></div>
  <div class="form-group full"><label class="check-row"><input type="checkbox" name="is_active" checked> Aktif yayınlansın</label></div>
  <div class="admin-form-actions"><button class="btn" type="submit">Kaydet</button><a class="btn ghost" href="{{ url_for('admin.admin_programs') }}">İptal</a></div>
</form>
</div></section>
{% endblock %}
