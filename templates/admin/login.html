<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Giriş</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=static_version) }}">
  <meta name="robots" content="noindex, nofollow">
</head>
<body class="admin-login-body">
  <main class="admin-login-shell">
    <section class="admin-login-card reveal-up">
      <p class="editorial-brand">Diyetisyen Mısra Çakır</p>
      <h1>Admin Giriş</h1>
      <p>İçerikleri, randevuları ve site ayarlarını yönetmek için giriş yap.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-wrapper admin-flash-wrapper">
            {% for category, message in messages %}
              <div class="flash-message {{ category }}">
                <span>{{ message }}</span>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" class="form admin-login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label>Kullanıcı Adı</label>
        <input type="text" name="username" autocomplete="username" required>

        <label>Şifre</label>
        <input type="password" name="password" autocomplete="current-password" required>

        <button class="btn" type="submit">Giriş Yap</button>
      </form>
    </section>
  </main>
</body>
</html>
