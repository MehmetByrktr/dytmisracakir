<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Giriş</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="page">
    <section class="page-hero">
      <div class="page-hero-inner">
        <div class="glass-card" style="max-width:480px; margin:60px auto;">
          <h1 class="page-title" style="font-size:32px;">Admin Giriş</h1>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <p class="{% if category == 'error' %}error-msg{% else %}success-msg{% endif %}">
                  {{ message }}
                </p>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <form method="post" class="form" style="margin-top:20px;">
            <label>Kullanıcı Adı</label>
            <input type="text" name="username" required>

            <label>Şifre</label>
            <input type="password" name="password" required>

            <button class="btn" type="submit">Giriş Yap</button>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
