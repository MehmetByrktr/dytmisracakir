{% extends "admin/admin_base.html" %}
{% block title %}Menü Düzenle{% endblock %}
{% block content %}
<section class="admin-page-head"><div><p class="admin-kicker">Admin Panel</p><h2 class="admin-title">Menüyü Düzenle</h2></div><a class="btn ghost" href="{{ url_for('admin.admin_menus') }}">← Listeye dön</a></section>
<section class="admin-form-layout"><div class="admin-form-card">
<form method="post" class="admin-form">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <div class="form-group full"><label>Menü Başlığı</label><input name="title" value="{{ menu.title }}" required></div>
  <div class="form-group"><label>Kategori</label><input name="category" value="{{ menu.category or '' }}"></div>
  <div class="form-group"><label>Sıra</label><input type="number" name="order_no" value="{{ menu.order_no }}"></div>
  <div class="form-group full"><label>Öğünler</label><div class="admin-helper-ribbon" aria-label="Yazım yardımı"><span class="admin-helper-chip">Kahvaltı</span><span class="admin-helper-chip">Öğle</span><span class="admin-helper-chip">Akşam</span><span class="admin-helper-chip">Ara öğün</span><span class="admin-helper-chip">Satır satır düzen</span></div><textarea name="meals" rows="7" required>{{ menu.meals }}</textarea></div>
  <div class="form-group"><label>Buton Yazısı</label><input name="button_text" value="{{ menu.button_text }}"></div>
  <div class="form-group full"><label class="check-row"><input type="checkbox" name="is_active" {% if menu.is_active %}checked{% endif %}> Aktif yayınlansın</label></div>
  <div class="admin-form-actions"><button class="btn" type="submit">Güncelle</button><a class="btn ghost" href="{{ url_for('admin.admin_menus') }}">İptal</a></div>
</form>
</div></section>
{% endblock %}
