{% extends "base.html" %}

{% block title %}Geçersiz İstek | Diyetisyen Mısra Çakır{% endblock %}

{% block content %}
<section class="error-page">
  <div class="error-card">
    <p class="error-code">400</p>
    <h1>Geçersiz istek.</h1>
    <p>Form güvenliği doğrulanamadı veya eksik bilgi gönderildi. Lütfen sayfayı yenileyip tekrar deneyin.</p>
    <div class="error-actions">
      <a class="btn" href="{{ url_for('public.home') }}">Ana Sayfaya Dön</a>
      <a class="btn ghost" href="{{ url_for('public.iletisim') }}#randevu">Randevu Formuna Git</a>
    </div>
  </div>
</section>
{% endblock %}
